
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    html,body{
        margin:0;
        padding:0;
        overflow:hidden;
    }
    #canvas{
        border:1px solid #ccc;
        cursor:none;
        border:1px solid #ccc;
        touch-action:none;
        width:100%;
        max-width:1500px;
        height:auto;
    }

    #toolCursor{
        position:fixed;
        font-size:24px;
        pointer-events:none;
        z-index:9999;
        display:none;
    }
    button{
        height: 30px;
        width: 20%;
        align-items: center;
    }
    </style>
</head>
<body>
<button id="pencilBtn">✏</button>
<button id="circleBtn"><i class="fa-regular fa-circle"></i></button>
<button id="rectBtn"><i class="fa-regular fa-square"></i></button>
<button id="triangleBtn">🔺</button>
<input type="color" id="colorPicker" value="#000000">

<br><br>

<div id="toolCursor">✏</div>

<canvas id="canvas" width="1500" height="700"></canvas>

<script>
function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function getTouchPos(touch){
    const rect = canvas.getBoundingClientRect();

    return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
    };
}

canvas.addEventListener("touchstart", (e)=>{
    e.preventDefault();

    const pos = getTouchPos(e.touches[0]);

    startX = pos.x;
    startY = pos.y;

    if(tool === "pencil"){
        drawing = true;

        ctx.beginPath();
        ctx.moveTo(startX,startY);

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 2;
    }
});

canvas.addEventListener("touchmove", (e)=>{
    e.preventDefault();

    const pos = getTouchPos(e.touches[0]);

    if(tool === "pencil" && drawing){
        ctx.lineTo(pos.x,pos.y);
        ctx.strokeStyle = currentColor;
        ctx.stroke();
    }
});

canvas.addEventListener("touchend", (e)=>{
    e.preventDefault();

    const touch = e.changedTouches[0];
    const pos = getTouchPos(touch);

    const endX = pos.x;
    const endY = pos.y;

    ctx.strokeStyle = currentColor;
    ctx.lineWidth = 2;

    if(tool === "circle"){
        const radius = Math.sqrt(
            (endX-startX)*(endX-startX) +
            (endY-startY)*(endY-startY)
        );

        ctx.beginPath();
        ctx.arc(startX,startY,radius,0,Math.PI*2);
        ctx.stroke();
    }

    if(tool === "rectangle"){
        ctx.strokeRect(
            startX,
            startY,
            endX-startX,
            endY-startY
        );
    }

    if(tool === "triangle"){
        ctx.beginPath();
        ctx.moveTo(startX,endY);
        ctx.lineTo((startX+endX)/2,startY);
        ctx.lineTo(endX,endY);
        ctx.closePath();
        ctx.stroke();
    }

    drawing = false;
});
</script>
</body>
</html>
