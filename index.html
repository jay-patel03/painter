
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    html,body{
        margin:0;
        padding:0;
        overflow:hidden;
    }
    #canvas{
        border:1px solid #ccc;
        cursor:none;
        border:1px solid #ccc;
        touch-action:none;
        width:100%;
        max-width:1500px;
        height:auto;
    }

    #toolCursor{
        position:fixed;
        pointer-events:none;
        z-index:9999;
        display:none;
    }
    button{
        height: 30px;
        width: 18%;
        align-items: center;
    }
    </style>
</head>
<button id="pencilBtn">✏</button>
<button id="circleBtn">⭕</button>
<button id="rectBtn">⬜</button>
<button id="triangleBtn">🔺</button>
<button id="eraserBtn">🧹</button>
<button id="undoBtn">↩</button>
<button id="redoBtn">↪</button>
<button id="fillBtn">🪣</button>
<button id="clearBtn">🗑</button>

<input type="color" id="colorPicker" value="#000000">

<input
    type="range"
    id="eraserSize"
    min="5"
    max="100"
    value="20">

<span id="sizeValue">20</span>

<br><br>

<canvas
    id="canvas"
    width="1500"
    height="700"
    style="border:1px solid #000;">
</canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let tool = "pencil";
let drawing = false;
let startX = 0;
let startY = 0;

let currentColor = "#000000";
let eraserSize = 20;

const history = [];
const redoHistory = [];

function saveState(){

    history.push(canvas.toDataURL());

    if(history.length > 50){
        history.shift();
    }

    redoHistory.length = 0;
}

function restoreState(data){

    const img = new Image();

    img.src = data;

    img.onload = () => {

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.drawImage(img,0,0);
    };
}

document.getElementById("pencilBtn").onclick = ()=>{
    tool = "pencil";
};

document.getElementById("circleBtn").onclick = ()=>{
    tool = "circle";
};

document.getElementById("rectBtn").onclick = ()=>{
    tool = "rectangle";
};

document.getElementById("triangleBtn").onclick = ()=>{
    tool = "triangle";
};

document.getElementById("eraserBtn").onclick = ()=>{
    tool = "eraser";
};
document.getElementById("fillBtn").onclick = ()=>{
    tool = "fill";
};

document.getElementById("colorPicker")
.addEventListener("input",(e)=>{
    currentColor = e.target.value;
});

document.getElementById("eraserSize")
.addEventListener("input",(e)=>{

    eraserSize = parseInt(e.target.value);

    document.getElementById("sizeValue")
    .innerText = eraserSize;
});

document.getElementById("undoBtn")
.addEventListener("click",()=>{

    if(history.length === 0) return;

    redoHistory.push(
        canvas.toDataURL()
    );

    restoreState(
        history.pop()
    );
});

document.getElementById("redoBtn")
.addEventListener("click",()=>{

    if(redoHistory.length === 0) return;

    history.push(
        canvas.toDataURL()
    );

    restoreState(
        redoHistory.pop()
    );
});

document.getElementById("clearBtn")
.addEventListener("click",()=>{

    saveState();

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
});

function resizeCanvas(){

    const imageData =
        canvas.toDataURL();

    canvas.width =
        window.innerWidth;

    canvas.height =
        window.innerHeight - 100;

    const img = new Image();

    img.src = imageData;

    img.onload = ()=>{
        ctx.drawImage(img,0,0);
    };
}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

function getTouchPos(touch){

    const rect =
        canvas.getBoundingClientRect();

    return{

        x:
        touch.clientX - rect.left,

        y:
        touch.clientY - rect.top
    };
}

canvas.addEventListener(
    "touchstart",
    (e)=>{

    e.preventDefault();

    const pos =
        getTouchPos(
            e.touches[0]
        );

    startX = pos.x;
    startY = pos.y;

    saveState();

    if(
        tool === "pencil" ||
        tool === "eraser"
    ){

        drawing = true;

        ctx.beginPath();

        ctx.moveTo(
            startX,
            startY
        );
    }
    if(tool === "fill"){

    saveState();

    floodFill(
        startX,
        startY,
        currentColor
    );
}
});


canvas.addEventListener(
    "touchmove",
    (e)=>{

    e.preventDefault();

    const pos =
        getTouchPos(
            e.touches[0]
        );

    if(
        drawing &&
        (
            tool === "pencil" ||
            tool === "eraser"
        )
    ){

        ctx.lineTo(
            pos.x,
            pos.y
        );

        if(
            tool === "pencil"
        ){

            ctx.strokeStyle =
                currentColor;

            ctx.lineWidth = 2;
        }

        if(
            tool === "eraser"
        ){

            ctx.strokeStyle =
                "#FFFFFF";

            ctx.lineWidth =
                eraserSize;

            ctx.lineCap =
                "round";
        }

        ctx.stroke();
    }
});

canvas.addEventListener(
    "touchend",
    (e)=>{

    e.preventDefault();

    const pos =
        getTouchPos(
            e.changedTouches[0]
        );

    ctx.strokeStyle =
        currentColor;

    ctx.lineWidth = 2;

    if(tool === "circle"){

        const radius =
        Math.sqrt(

            Math.pow(
                pos.x-startX,
                2
            ) +

            Math.pow(
                pos.y-startY,
                2
            )
        );

        ctx.beginPath();

        ctx.arc(
            startX,
            startY,
            radius,
            0,
            Math.PI*2
        );

        ctx.stroke();
    }

    if(tool === "rectangle"){

        ctx.strokeRect(

            startX,

            startY,

            pos.x-startX,

            pos.y-startY
        );
    }

    if(tool === "triangle"){

        ctx.beginPath();

        ctx.moveTo(
            startX,
            pos.y
        );

        ctx.lineTo(
            (startX+pos.x)/2,
            startY
        );

        ctx.lineTo(
            pos.x,
            pos.y
        );

        ctx.closePath();

        ctx.stroke();
    }

    drawing = false;
});

function hexToRgb(hex) {
    const bigint = parseInt(hex.slice(1), 16);

    return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
    };
}

function floodFill(x, y, fillColor) {

    const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const data = imageData.data;

    const targetPos =
        (Math.floor(y) * canvas.width + Math.floor(x)) * 4;

    const targetColor = [
        data[targetPos],
        data[targetPos + 1],
        data[targetPos + 2],
        data[targetPos + 3]
    ];

    const fill = hexToRgb(fillColor);

    const stack = [[Math.floor(x), Math.floor(y)]];

    while(stack.length){

        const [cx, cy] = stack.pop();

        if(
            cx < 0 ||
            cy < 0 ||
            cx >= canvas.width ||
            cy >= canvas.height
        ){
            continue;
        }

        const pos =
            (cy * canvas.width + cx) * 4;

        if(
            data[pos] === targetColor[0] &&
            data[pos + 1] === targetColor[1] &&
            data[pos + 2] === targetColor[2] &&
            data[pos + 3] === targetColor[3]
        ){

            data[pos] = fill.r;
            data[pos + 1] = fill.g;
            data[pos + 2] = fill.b;
            data[pos + 3] = 255;

            stack.push([cx + 1, cy]);
            stack.push([cx - 1, cy]);
            stack.push([cx, cy + 1]);
            stack.push([cx, cy - 1]);
        }
    }

    ctx.putImageData(
        imageData,
        0,
        0
    );
}
</script>
</body>
</html>
