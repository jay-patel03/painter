
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    #canvas{
        border:1px solid #ccc;
        cursor:none;
        border:1px solid #ccc;
        touch-action:none;
        width:100%;
        max-width:1500px;
        height:auto;
    }

    #toolCursor{
        position:absolute;
        font-size:24px;
        pointer-events:none;
        display:block;
        transform:translate(-50%,-50%);
    }
    button{
        height: 30px;
        width: 20%;
        align-items: center;
    }
    </style>
</head>
<body>
<button id="pencilBtn">✏ Pencil</button>
<button id="circleBtn"><i class="fa-regular fa-circle"></i></button>
<button id="rectBtn"><i class="fa-regular fa-square"></i></button>
<button id="triangleBtn">🔺</button>
<button id="circleBtn"><i class="fa-regular fa-circle"></i></button>
<button id="rectBtn"><i class="fa-regular fa-square"></i></button>

<input type="color" id="colorPicker" value="#000000">

<br><br>

<div id="toolCursor">✏</div>

<canvas id="canvas" width="1500" height="700"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const toolCursor = document.getElementById("toolCursor");
const colorPicker = document.getElementById("colorPicker");

    var tool = "pencil";
    var drawing = false;
    var startX, startY;
    var currentColor = "#000000";

colorPicker.addEventListener("input", () => {
    currentColor = colorPicker.value;
});

document.getElementById("pencilBtn").onclick = () => {
    tool = "pencil";
    toolCursor.innerHTML = "✏";
};

document.getElementById("circleBtn").onclick = () => {
    tool = "circle";
    toolCursor.innerHTML = "+";
};

document.getElementById("rectBtn").onclick = () => {
    tool = "rectangle";
    toolCursor.innerHTML = "+";
};

document.getElementById("triangleBtn").onclick = () => {
    tool = "triangle";
    toolCursor.innerHTML = "+";
};

document.addEventListener("mousemove", (e) => {
    toolCursor.style.left = e.pageX + "px";
    toolCursor.style.top = e.pageY + "px";
});

canvas.addEventListener("mousedown", (e) => {

    startX = e.offsetX;
    startY = e.offsetY;

    if(tool === "pencil"){
        drawing = true;

        ctx.beginPath();
        ctx.moveTo(startX, startY);

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
    }
});

canvas.addEventListener("mousemove", (e) => {

    if(tool === "pencil" && drawing){

        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.strokeStyle = currentColor;
        ctx.stroke();
    }
});

canvas.addEventListener("mouseup", (e) => {

    var endX = e.offsetX;
    var endY = e.offsetY;

    ctx.strokeStyle = currentColor;
    ctx.lineWidth = 2;

    if(tool === "circle"){

        var radius = Math.sqrt(
            Math.pow(endX - startX, 2) +
            Math.pow(endY - startY, 2)
        );

        ctx.beginPath();
        ctx.arc(startX, startY, radius, 0, Math.PI * 2);
        ctx.stroke();
    }

    if(tool === "rectangle"){

        ctx.strokeRect(
            startX,
            startY,
            endX - startX,
            endY - startY
        );
    }

    if(tool === "triangle"){

        ctx.beginPath();
        ctx.moveTo(startX, endY);
        ctx.lineTo((startX + endX) / 2, startY);
        ctx.lineTo(endX, endY);
        ctx.closePath();
        ctx.stroke();
    }

    drawing = false;
});

canvas.addEventListener("mouseleave", () => {
    drawing = false;
});
function getTouchPos(canvas, touch) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
    };
}

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();

    const pos = getTouchPos(canvas, e.touches[0]);

    startX = pos.x;
    startY = pos.y;

    if(tool === "pencil"){
        drawing = true;

        ctx.beginPath();
        ctx.moveTo(startX, startY);

        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 2;
    }
});

canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();

    const pos = getTouchPos(canvas, e.touches[0]);

    if(tool === "pencil" && drawing){
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = currentColor;
        ctx.stroke();
    }
});

canvas.addEventListener("touchend", (e) => {
    e.preventDefault();

    drawing = false;
});
</script>
</body>
</html>
